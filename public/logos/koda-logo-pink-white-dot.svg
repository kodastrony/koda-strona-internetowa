<?xml version="1.0" encoding="UTF-8"?>
<!--
  KODA Studio — Wordmark
  Wariant: różowe litery + biała kropka
  Tło: przezroczyste (brak wypełnienia)
  Użycie: różowe/kolorowe tła (np. sekcja CTA)
  Font: Syne 800 (Google Fonts)
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="-2 -1 134 32"
  role="img"
  aria-label="KODA Studio"
>
  <title>KODA Studio</title>
  <!-- Brak zewnętrznego @import (Syne) — pliki nieużywane w aplikacji (logo = inline
       SVG w koda-logo.tsx). Usunięto odwołanie do Google Fonts (CSP font-src 'self' / prywatność). -->
  <text
    font-family="'Syne', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="26"
    letter-spacing="-1.04"
    y="23"
  >
    <tspan fill="#cf43b8">KODA</tspan><tspan fill="#eeeeee">.</tspan>
  </text>
</svg>
