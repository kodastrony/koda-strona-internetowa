name: Deploy to GitHub Pages

# Buduje statyczny eksport Next.js i publikuje go na GitHub Pages.
# Wyzwalane przy każdym pushu na main (oraz ręcznie z zakładki Actions).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Uprawnienia wymagane przez actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Jeden deploy na raz; nie przerywaj trwającego.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Disable Jekyll (zachowaj katalog _next)
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
