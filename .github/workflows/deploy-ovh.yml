name: Deploy to OVH

# Każdy push na main → automatyczny build statycznego eksportu Next.js
# + wgranie go przez FTP na hosting OVH (domena kodastrony.pl).
# Można też odpalić ręcznie z zakładki Actions (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Tylko jeden deploy naraz; nowszy push anuluje trwający.
concurrency:
  group: deploy-ovh
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build static export + FTP → OVH
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export (out/)
        run: npm run build
        env:
          STATIC_EXPORT: "true"
          # Formularz leadów używa FormSubmit.co (natywny POST, BEZ klucza/env).

      - name: Deploy out/ → OVH www/ (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.cluster129.hosting.ovh.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./www/
          # Czysta podmiana: usuń stare pliki na serwerze (np. po starej stronie z repo
          # KODA) i wgraj świeży build. Dzięki temu na domenie jest TYLKO ta strona.
          dangerous-clean-slate: true
